services:
  db:
    image: postgres:16-alpine
    container_name: sentinel_db
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      target: worker
    container_name: sentinel_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  dashboard:
    build:
      context: .
      target: dashboard
    container_name: sentinel_dashboard
    restart: unless-stopped
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
